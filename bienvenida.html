<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyList - Bienvenido</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .welcome-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--background) 100%);
        }

        .welcome-card {
            background: var(--surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .welcome-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
        }

        .welcome-icon svg {
            width: 60px;
            height: 60px;
            fill: var(--text-on-primary);
        }

        .welcome-title {
            color: var(--primary-dark);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .welcome-features {
            text-align: left;
            margin-bottom: 2.5rem;
        }

        .welcome-feature {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: var(--surface-variant);
            border-radius: var(--border-radius-sm);
        }

        .welcome-feature svg {
            width: 24px;
            height: 24px;
            fill: var(--primary-color);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .welcome-feature-text {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .btn-comenzar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: var(--text-on-primary);
            border: none;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.3);
        }

        .btn-comenzar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(46, 125, 50, 0.4);
        }

        @media (max-width: 600px) {
            .welcome-container {
                padding: 1rem;
            }

            .welcome-card {
                padding: 2rem 1.5rem;
            }

            .welcome-title {
                font-size: 1.75rem;
            }

            .welcome-icon {
                width: 100px;
                height: 100px;
            }

            .welcome-icon svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-card">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7,18c-1.1,0 -1.99,0.9 -1.99,2S5.9,22 7,22s2,-0.9 2,-2 -0.9,-2 -2,-2zM1,2v2h2l3.6,7.59 -1.35,2.45c-0.16,0.28 -0.25,0.61 -0.25,0.96 0,1.1 0.9,2 2,2h12v-2H7.42c-0.14,0 -0.25,-0.11 -0.25,-0.25l0.03,-0.12 0.9,-1.63h7.45c0.75,0 1.41,-0.41 1.75,-1.03l3.58,-6.49c0.08,-0.14 0.12,-0.31 0.12,-0.48 0,-0.55 -0.45,-1 -1,-1H5.21l-0.94,-2H1zM17,18c-1.1,0 -1.99,0.9 -1.99,2s0.89,2 1.99,2 2,-0.9 2,-2 -0.9,-2 -2,-2z"/>
                </svg>
            </div>

            <h1 class="welcome-title">Bienvenido a FamilyList</h1>
            <p class="welcome-subtitle">Tu lista de compras familiar sincronizada</p>

            <div class="welcome-features">
                <div class="welcome-feature">
                    <svg viewBox="0 0 24 24">
                        <path d="M16,11c1.66,0 2.99,-1.34 2.99,-3S17.66,5 16,5c-1.66,0 -3,1.34 -3,3s1.34,3 3,3zm-8,0c1.66,0 2.99,-1.34 2.99,-3S9.66,5 8,5C6.34,5 5,6.34 5,8s1.34,3 3,3zm0,2c-2.33,0 -7,1.17 -7,3.5V19h14v-2.5c0,-2.33 -4.67,-3.5 -7,-3.5zm8,0c-0.29,0 -0.62,0.02 -0.97,0.05 1.16,0.84 1.97,1.97 1.97,3.45V19h6v-2.5c0,-2.33 -4.67,-3.5 -7,-3.5z"/>
                    </svg>
                    <span class="welcome-feature-text">Crea o unete a una familia para compartir la lista de compras</span>
                </div>
                <div class="welcome-feature">
                    <svg viewBox="0 0 24 24">
                        <path d="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zm-2,15l-5,-5 1.41,-1.41L10,14.17l7.59,-7.59L19,8l-9,9z"/>
                    </svg>
                    <span class="welcome-feature-text">Agrega productos y marcalos como comprados en tiempo real</span>
                </div>
                <div class="welcome-feature">
                    <svg viewBox="0 0 24 24">
                        <path d="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zm1,17h-2v-2h2v2zm2.07,-7.75l-0.9,0.92C13.45,12.9 13,13.5 13,15h-2v-0.5c0,-1.1 0.45,-2.1 1.17,-2.83l1.24,-1.26c0.37,-0.36 0.59,-0.86 0.59,-1.41 0,-1.1 -0.9,-2 -2,-2s-2,0.9 -2,2H8c0,-2.21 1.79,-4 4,-4s4,1.79 4,4c0,0.88 -0.36,1.68 -0.93,2.25z"/>
                    </svg>
                    <span class="welcome-feature-text">Sincronizacion automatica entre todos los miembros</span>
                </div>
            </div>

            <button class="btn-comenzar" onclick="window.location.href='familia.html'">
                Comencemos
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Scripts del proyecto (auth.js maneja la navegacion) -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
