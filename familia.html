<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyList - Configurar Familia</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .familia-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--background) 100%);
        }

        .familia-card {
            background: var(--surface);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
        }

        .familia-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .familia-header h1 {
            color: var(--primary-dark);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .familia-header p {
            color: var(--text-secondary);
        }

        .familia-section {
            margin-bottom: 2rem;
        }

        .familia-section h2 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .familia-section p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--text-hint);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--divider);
        }

        .divider span {
            padding: 0 1rem;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: var(--text-on-primary);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="familia-container">
        <div class="familia-card">
            <div class="familia-header">
                <h1>Configura tu Familia</h1>
                <p>Crea una nueva familia o unete a una existente</p>
            </div>

            <!-- Crear Familia -->
            <div class="familia-section">
                <h2>Crear nueva familia</h2>
                <p>Crea una familia y comparte el codigo con tus seres queridos</p>
                <form id="form-crear">
                    <div class="form-group">
                        <label for="nombre-familia">Nombre de la familia</label>
                        <input type="text" id="nombre-familia" placeholder="Ej: Familia Garcia" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear Familia</button>
                </form>
            </div>

            <div class="divider">
                <span>o</span>
            </div>

            <!-- Unirse a Familia -->
            <div class="familia-section">
                <h2>Unirse a familia existente</h2>
                <p>Ingresa el codigo de 6 caracteres que te compartieron</p>
                <form id="form-unirse">
                    <div class="form-group">
                        <label for="codigo-familia">Codigo de familia</label>
                        <input type="text" id="codigo-familia" placeholder="Ej: ABC123" maxlength="6"
                               style="text-transform: uppercase; letter-spacing: 0.2em; font-family: monospace;" required>
                    </div>
                    <button type="submit" class="btn btn-outline" style="width: 100%;">Unirse a Familia</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Scripts del proyecto -->
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/familia.js"></script>
</body>
</html>
